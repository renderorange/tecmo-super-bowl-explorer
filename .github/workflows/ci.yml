name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Setup test database
              run: |
                  # Clone automator project (seed data is in git)
                  git clone https://github.com/renderorange/tecmo-super-bowl-automator.git ../tecmo-super-bowl-automator
                  cd ../tecmo-super-bowl-automator

                  # Install dependencies and setup database
                  npm ci

                  # Run migrations and seed (creates schema + 28 teams + 840 players)
                  export TSB_DB_PATH="../tecmo-super-bowl-explorer/test/data/stats.db"
                  npm run db:migrate
                  npm run db:seed

                  # Generate test data
                  cd ../tecmo-super-bowl-explorer
                  node scripts/generate-test-data.js --seasons 1000

            - name: Run lint check
              run: npm run lint:check

            - name: Run format check
              run: npm run format:check

            - name: Run tests
              run: npm run test
              env:
                  DB_PATH: test/data/stats.db

            - name: Run performance tests
              run: npm run test:performance
              env:
                  DB_PATH: test/data/stats.db

            - name: Run test coverage and check threshold
              run: |
                  npm run test:coverage > coverage-output.txt 2>&1
                  cat coverage-output.txt
                  COVERAGE=$(grep "All files" coverage-output.txt | awk '{print $4}' | head -1)
                  echo "Statement Coverage: ${COVERAGE}%"

                  # Compare using awk (handles floating point)
                  THRESHOLD=80
                  PASS=$(echo "$COVERAGE $THRESHOLD" | awk '{if ($1 >= $2) print "1"; else print "0"}')

                  if [ "$PASS" = "0" ]; then
                    echo "❌ Error: Coverage ${COVERAGE}% is below ${THRESHOLD}% threshold"
                    exit 1
                  fi

                  echo "✅ Coverage check passed: ${COVERAGE}% >= ${THRESHOLD}%"
